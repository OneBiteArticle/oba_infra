# [1단계] 인증서 발급 전 설정
# 443 관련 설정(SSL)은 모두 주석 처리하고 시작

server {
    listen 80;
    server_name your-domain.com; # 실제 도메인으로 변경

    # Certbot 인증용 경로 (갱신을 위해서도 계속 유지해야 함)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # [3단계] 인증서 발급 후 아래 주석 해제 (HTTP -> HTTPS 강제 리다이렉트)
    # return 301 https://$host$request_uri;

    # [1단계용] 인증서 발급 전에는 여기에 아래 location 블록들이 있어야 접속 확인 가능
    location / {
        proxy_pass http://frontend:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}

