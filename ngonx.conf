server {
    listen 80;
    server_name _;

    # 1. Frontend (Vite/React) - 기본 접속 경로
    location / {
        proxy_pass http://frontend:8081; 
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # 2. Spring Backend - 스프링 API 요청
    location ~ ^/(api|auth)/ {
        proxy_pass http://spring_backend:8080; 
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # 3. AI Service (FastAPI) - AI 관련 API 요청
    location /ai/ {
        proxy_pass http://ai_service:8000/; 
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}