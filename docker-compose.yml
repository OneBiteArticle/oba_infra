services:
  ai_nginx:
    image: nginx:1.25
    container_name: oba-nginx
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - ./data/certbot/conf:/etc/letsencrypt # 실제 인증서 저장소
      - ./data/certbot/www:/var/www/certbot # 인증을 위한 임시 파일 경로
    ports:
      - "80:80"
      - "443:443"
    networks:
      - oba_shared_network
    restart: always

  certbot:
    image: certbot/certbot
    container_name: oba-certbot
    volumes:
      - ./data/certbot/conf:/etc/letsencrypt
      - ./data/certbot/www:/var/www/certbot
    # 48시간마다 자동으로 갱신 시도
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 48h & wait $${!}; done;'"
    networks:
      - oba_shared_network
    depends_on:
      - ai_nginx
    restart: always
    
  jenkins:
    build: ./jenkins
    container_name: jenkins-server
    restart: always
    # 메모리 사용량 제한 (하드웨어 레벨)
    deploy:
      resources:
        limits:
          memory: 768M  # 최대 768MB 이상 못 쓰게 차단
        reservations:
          memory: 400M  # 최소 이 정도는 보장
    ports:
      - "9090:8080"
      - "50000:50000"
    volumes:
      - ./jenkins/jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - TZ=Asia/Seoul
      # 핵심: Java 힙 메모리 최소/최대 제한 추가
      - JAVA_OPTS=-Xms256m -Xmx512m -XX:MaxMetaspaceSize=128m -Dhudson.security.csrf.GlobalCrumbIssuerConfiguration.DISABLE_CSRF_PROTECTION=true

networks:
  oba_shared_network:
    external: true
